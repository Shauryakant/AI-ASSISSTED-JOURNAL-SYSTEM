version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: journal-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: journal-app
    ports:
      - "3000:3000"
    env_file:
      - ./app/.env.local
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ai-journal
    depends_on:
      - mongodb

volumes:
  mongodb_data:
