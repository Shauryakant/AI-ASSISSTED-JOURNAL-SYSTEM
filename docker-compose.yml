version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: journal-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: journal-backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ai-journal
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: journal-frontend
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://backend:5000
    depends_on:
      - backend

volumes:
  mongodb_data:
